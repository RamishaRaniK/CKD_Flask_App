<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CKD Prediction Result</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .container {
            background: white;
            max-width: 600px;
            width: 100%;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
            text-align: center;
        }

        h1 {
            color: #1e3c72;
            margin-bottom: 15px;
        }

        p {
            color: #666;
            margin-bottom: 30px;
        }

        .result-box {
            padding: 25px;
            border-radius: 15px;
            margin: 25px 0;
            font-size: 24px;
            font-weight: 600;
        }

        /* CKD Detected */
        .positive {
            background: #ffe5e5;
            color: #c62828;
            border: 2px solid #ef5350;
        }

        /* No CKD */
        .negative {
            background: #e8f5e9;
            color: #2e7d32;
            border: 2px solid #43a047;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 14px 30px;
            background: linear-gradient(to right,#1e3c72,#2a5298);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        }

        .footer {
            margin-top: 30px;
            color: #888;
            font-size: 13px;
        }

        @media(max-width:600px){

            .container{
                padding:30px 20px;
            }

            .result-box{
                font-size:20px;
            }

        }

    </style>

</head>

<body>

    <div class="container">

        <h1>🩺 CKD Prediction Result</h1>

        <p>The AI model has analyzed the patient's laboratory values.</p>

        {% if "CKD" in prediction or "Positive" in prediction %}
        <div class="result-box positive">
            ⚠️ {{ prediction }}
        </div>
        {% else %}
        <div class="result-box negative">
            ✅ {{ prediction }}
        </div>
        {% endif %}

        <a href="/" class="btn">
            🔄 Predict Again
        </a>

        <div class="footer">
            AI Powered Chronic Kidney Disease Prediction System
        </div>

    </div>

</body>

</html>
